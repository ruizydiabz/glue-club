<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glue Club - Laboratoire</title>
    
    <!-- Google Fonts : Enfantine (Patrick Hand) & Punk (Permanent Marker, Rubik Glitch) -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Permanent+Marker&family=Rubik+Glitch&display=swap" rel="stylesheet">
    
    <!-- Cropper.js pour le recadrage -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <!-- html2canvas pour l'exportation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS Variables */
        :root {
            --electric-blue: #0033ff;
            --white: #ffffff;
            --font-ui: 'Patrick Hand', cursive; /* Écriture d'enfant */
            --font-punk-1: 'Permanent Marker', cursive;
            --font-punk-2: 'Rubik Glitch', system-ui;
            --win7-bg: #ece9d8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: var(--font-ui);
            color: var(--white);
            /* Motif Zèbre */
            background: repeating-linear-gradient(
                -45deg,
                #000,
                #000 20px,
                #fff 20px,
                #fff 40px
            );
            overflow: hidden;
        }

        /* --- POP-UPS WINDOWS 7 STYLE --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .win7-window {
            background: var(--win7-bg);
            border: 2px solid #fff;
            border-right-color: #888;
            border-bottom-color: #888;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.5);
            width: 450px;
            max-width: 90%;
            color: #000; /* Texte noir pour l'intérieur du pop-up */
            display: none;
            flex-direction: column;
        }

        .win7-window.active {
            display: flex;
        }

        .win7-titlebar {
            background: linear-gradient(to right, #0058e6, #3a93ff);
            color: white;
            padding: 5px 10px;
            font-weight: bold;
            font-family: Tahoma, sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .win7-close {
            background: #e04343;
            color: white;
            border: 1px solid white;
            width: 20px; height: 20px;
            text-align: center;
            line-height: 18px;
            cursor: pointer;
            font-size: 12px;
        }

        .win7-content {
            padding: 30px 20px;
            text-align: center;
        }

        .logo-title {
            font-family: var(--font-punk-2); /* Logo très marqué */
            font-size: 5rem;
            margin: 0 0 10px 0;
            color: var(--electric-blue);
            text-shadow: 2px 2px 0 #000;
        }

        .win7-text {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .win7-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .win7-btn {
            background: #e1e1e1;
            border: 2px solid #fff;
            border-right-color: #888;
            border-bottom-color: #888;
            padding: 10px 30px;
            cursor: pointer;
            font-family: var(--font-ui);
            font-size: 1.5rem;
            color: #000;
        }
        .win7-btn:active {
            border: 2px solid #888;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        /* --- APP LAYOUT --- */
        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            filter: blur(10px);
            transition: filter 0.3s ease;
        }

        #app-container.active {
            filter: blur(0);
        }

        /* CANVAS AREA (LEFT) */
        #canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        #export-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3/4;
            background-color: var(--white); /* Fond du canvas Blanc Pur */
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #bg-layer { z-index: 1; }
        
        #user-layer {
            z-index: 2;
            transition: opacity 0.2s ease, filter 0.2s ease;
        }

        .text-overlay {
            position: absolute;
            z-index: 3;
            font-size: 4rem;
            color: #000;
            text-shadow: 2px 2px 0 #fff;
            cursor: move;
            user-select: none;
            white-space: nowrap;
        }

        /* CONTROL PANEL (RIGHT) */
        #control-panel {
            width: 380px;
            background-color: var(--electric-blue); /* Bleu Électrique */
            color: var(--white); /* Texte Blanc */
            border-left: 4px solid #000;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h2.panel-title {
            font-size: 3rem;
            margin: 0;
            border-bottom: 3px dashed var(--white);
            padding-bottom: 10px;
            text-align: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid var(--white);
        }

        .control-group label {
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        input[type="file"], select, input[type="text"] {
            font-family: var(--font-ui);
            font-size: 1.1rem;
            padding: 8px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            width: 100%;
            box-sizing: border-box;
        }

        /* Stylisation des curseurs (Sliders) */
        input[type="range"] {
            width: 100%;
            accent-color: #000;
        }
        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        button {
            font-family: var(--font-ui);
            font-size: 1.3rem;
            background: var(--white);
            color: var(--electric-blue);
            border: 3px solid #000;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 3px 3px 0 #000;
        }
        button:hover { 
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #000;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0 #000;
        }

        /* Background Library Grid */
        .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            max-height: 160px;
            overflow-y: auto;
            border: 2px solid #000;
            padding: 5px;
            background: #fff;
        }

        .bg-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .bg-thumb:hover { border-color: var(--electric-blue); }

        /* BIG EXPORT BUTTON */
        .btn-export {
            background: #000;
            color: #fff;
            font-size: 1.8rem;
            padding: 20px;
            margin-top: auto;
            border: 4px solid var(--white);
            text-transform: uppercase;
        }
        .btn-export:hover {
            background: var(--white);
            color: #000;
            border-color: #000;
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 900px) {
            #app-container {
                flex-direction: column;
            }
            #control-panel {
                width: 100%;
                height: 50vh;
                border-left: none;
                border-top: 4px solid #000;
            }
            #canvas-area {
                height: 50vh;
            }
        }
    </style>
</head>
<body>

    <!-- SVG Filters for complex destructive effects -->
    <svg style="display:none;">
        <defs>
            <!-- Effet Bitmap / Dither Threshold -->
            <filter id="bitmap-filter">
                <feColorMatrix type="matrix" values="
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0 0 0 1 0" />
                <feComponentTransfer>
                    <feFuncR type="discrete" tableValues="0 1"/>
                    <feFuncG type="discrete" tableValues="0 1"/>
                    <feFuncB type="discrete" tableValues="0 1"/>
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <!-- ONBOARDING OVERLAY -->
    <div id="overlay">
        <!-- POP-UP 1 : ACCUEIL -->
        <div id="popup-1" class="win7-window active">
            <div class="win7-titlebar">
                <span>GLUEOS.exe</span>
                <div class="win7-close">X</div>
            </div>
            <div class="win7-content">
                <h1 class="logo-title">GLUE CLUB</h1>
                <div class="win7-text">T'as ramené ta colle ?</div>
                <div class="win7-buttons">
                    <button class="win7-btn" id="btn-oui">Oui</button>
                    <button class="win7-btn" id="btn-zappe">J'ai zappé</button>
                </div>
            </div>
        </div>

        <!-- POP-UP 2 : CONFIRMATION ABSURDE -->
        <div id="popup-2" class="win7-window">
            <div class="win7-titlebar">
                <span>Alerte Système</span>
                <div class="win7-close">X</div>
            </div>
            <div class="win7-content">
                <div class="win7-text">T'es sûr(e) ?</div>
                <div class="win7-buttons">
                    <button class="win7-btn" id="btn-non1">Non</button>
                    <button class="win7-btn" id="btn-non2">Non</button>
                </div>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-container">
        <!-- CANVAS (LEFT) -->
        <div id="canvas-area">
            <div id="export-wrapper">
                <img id="bg-layer" class="layer" src="1.jpg" alt="Fond">
                <img id="user-layer" class="layer" src="" alt="" style="display:none;">
                <div id="text-container"></div>
            </div>
        </div>

        <!-- CONTROL PANEL (RIGHT) -->
        <div id="control-panel">
            <h2 class="panel-title">Laboratoire</h2>

            <!-- 1. Importation -->
            <div class="control-group">
                <label>1. Ton image</label>
                <input type="file" id="upload-user" accept="image/*">
                <button id="btn-remove-bg">✂️ Détourage Magique</button>
            </div>

            <!-- 3. Bibliothèque -->
            <div class="control-group">
                <label>2. Fonds de magazines (13)</label>
                <div class="bg-grid" id="bg-library">
                    <!-- Généré par JS -->
                </div>
            </div>

            <!-- 4. Modes de fusion & Intensité -->
            <div class="control-group">
                <label>3. Masque de Fusion</label>
                <select id="blend-mode">
                    <option value="normal">Normal</option>
                    <option value="multiply">Produit (Multiply)</option>
                    <option value="screen">Superposition (Screen)</option>
                    <option value="overlay">Incrustation (Overlay)</option>
                    <option value="darken">Obscurcir (Darken)</option>
                    <option value="lighten">Éclaircir (Lighten)</option>
                    <option value="difference">Différence</option>
                    <option value="exclusion">Exclusion</option>
                    <option value="color-dodge">Densité couleur - (Color Dodge)</option>
                </select>
                <div class="slider-row">
                    <span>Intensité du masque</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="100" value="100">
            </div>

            <!-- 5. Effets Destructifs -->
            <div class="control-group">
                <label>4. Effets Destructifs</label>
                <div class="slider-row"><span>Pixelisation / Flou</span></div>
                <input type="range" id="pixel-slider" min="0" max="20" value="0">
                
                <div class="slider-row" style="margin-top:10px;">
                    <label style="display:flex; align-items:center; gap:10px; font-size:1.1rem; cursor:pointer;">
                        <input type="checkbox" id="bitmap-toggle" style="width:20px;height:20px;"> 
                        Activer Effet Bitmap (Seuil PP)
                    </label>
                </div>
                <div class="slider-row"><span>Intensité Bitmap (Contraste)</span></div>
                <input type="range" id="bitmap-intensity" min="100" max="500" value="100">
            </div>

            <!-- 6. Colorimétrie -->
            <div class="control-group">
                <label>5. Colorimétrie</label>
                <div class="slider-row"><span>Luminosité</span></div>
                <input type="range" id="bri-slider" min="0" max="200" value="100">
                
                <div class="slider-row"><span>Contraste</span></div>
                <input type="range" id="cont-slider" min="0" max="200" value="100">

                <div class="slider-row"><span>Saturation</span></div>
                <input type="range" id="sat-slider" min="0" max="200" value="100">
                
                <label style="margin-top:10px; display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="bw-toggle" style="width:20px;height:20px;"> Filtre Noir & Blanc
                </label>
            </div>

            <!-- 7. Outils Créatifs -->
            <div class="control-group">
                <label>6. Outils Créatifs</label>
                <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:10px;">
                    <input type="text" id="text-input" placeholder="Taper un texte...">
                    <select id="font-selector">
                        <option value="var(--font-punk-1)">Police : Permanent Marker</option>
                        <option value="var(--font-punk-2)">Police : Rubik Glitch</option>
                        <option value="var(--font-ui)">Police : Enfantine</option>
                    </select>
                    <button id="btn-add-text">Ajouter Texte</button>
                </div>
                <button id="btn-crop">Recadrer l'image (Crop)</button>
                <button id="btn-crop-validate" style="display:none; background:#e04343; color:#fff;">Valider Recadrage</button>
            </div>

            <!-- EXPORT -->
            <button class="btn-export" id="btn-export">Exporter l'image 💾</button>
        </div>
    </div>

    <script>
        // --- ONBOARDING LOGIC ---
        const overlay = document.getElementById('overlay');
        const popup1 = document.getElementById('popup-1');
        const popup2 = document.getElementById('popup-2');
        const appContainer = document.getElementById('app-container');

        function startApp() {
            overlay.style.display = 'none';
            appContainer.classList.add('active');
        }

        // Clics Pop-up 1
        document.getElementById('btn-oui').onclick = startApp;
        document.getElementById('btn-zappe').onclick = () => {
            popup1.classList.remove('active');
            popup2.classList.add('active');
        };

        // Clics Pop-up 2
        document.getElementById('btn-non1').onclick = startApp;
        document.getElementById('btn-non2').onclick = startApp;
        
        // Fermeture avec la croix rouge
        document.querySelectorAll('.win7-close').forEach(btn => btn.onclick = startApp);

        // --- APP LOGIC ---
        const userLayer = document.getElementById('user-layer');
        const bgLayer = document.getElementById('bg-layer');
        
        // 1. Importation
        document.getElementById('upload-user').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const url = URL.createObjectURL(e.target.files[0]);
                userLayer.src = url;
                userLayer.style.display = 'block';
                updateFilters(); 
            }
        });

        // 2. Détourage auto (Simulation via Multiply)
        document.getElementById('btn-remove-bg').addEventListener('click', () => {
            if(!userLayer.src) return alert("Importe d'abord une image !");
            document.getElementById('blend-mode').value = 'multiply';
            userLayer.style.mixBlendMode = 'multiply';
            alert("Mode détourage magique activé (Fusion Produit appliquée).");
        });

        // 3. Bibliothèque (1 à 13)
        const bgLibrary = document.getElementById('bg-library');
        const totalBackgrounds = 13;
        
        for (let i = 1; i <= totalBackgrounds; i++) {
            const imgPath = `${i}.jpg`;
            const img = document.createElement('img');
            img.className = 'bg-thumb';
            img.src = imgPath;
            img.alt = `Fond ${i}`;
            img.onclick = () => {
                bgLayer.src = imgPath;
            };
            bgLibrary.appendChild(img);
        }

        // 4. Modes de fusion & Opacité
        document.getElementById('blend-mode').addEventListener('change', (e) => {
            userLayer.style.mixBlendMode = e.target.value;
        });

        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            userLayer.style.opacity = e.target.value / 100;
        });

        // 5 & 6. Filtres Colorimétriques et Destructifs
        const briSlider = document.getElementById('bri-slider');
        const contSlider = document.getElementById('cont-slider');
        const satSlider = document.getElementById('sat-slider');
        const bwToggle = document.getElementById('bw-toggle');
        
        const pixelSlider = document.getElementById('pixel-slider');
        const bitmapToggle = document.getElementById('bitmap-toggle');
        const bitmapIntensity = document.getElementById('bitmap-intensity');

        function updateFilters() {
            let filterString = `
                brightness(${briSlider.value}%) 
                contrast(${contSlider.value}%) 
                saturate(${satSlider.value}%)
            `;
            
            if (bwToggle.checked) {
                filterString += "grayscale(100%) ";
            }
            
            if (pixelSlider.value > 0) {
                filterString += `blur(${pixelSlider.value}px) `;
            }

            // Gestion de l'effet Bitmap
            if (bitmapToggle.checked) {
                // Application du filtre SVG + contraste poussé pour l'intensité
                filterString += `url(#bitmap-filter) contrast(${bitmapIntensity.value}%) `;
            }

            userLayer.style.filter = filterString;
        }

        // Écouteurs pour les filtres
        [briSlider, contSlider, satSlider, pixelSlider, bitmapIntensity].forEach(slider => {
            slider.addEventListener('input', updateFilters);
        });
        [bwToggle, bitmapToggle].forEach(toggle => {
            toggle.addEventListener('change', updateFilters);
        });

        // 7. Outil Texte
        document.getElementById('btn-add-text').addEventListener('click', () => {
            const textVal = document.getElementById('text-input').value;
            const fontSelected = document.getElementById('font-selector').value;
            if(!textVal) return;

            const textDiv = document.createElement('div');
            textDiv.className = 'text-overlay';
            textDiv.innerText = textVal;
            textDiv.style.fontFamily = fontSelected;
            textDiv.style.top = '50%';
            textDiv.style.left = '50%';
            textDiv.style.transform = 'translate(-50%, -50%)';
            
            // Drag Logic
            let isDragging = false;
            let currentX;
            let currentY;
            let initialX;
            let initialY;
            let xOffset = 0;
            let yOffset = 0;

            textDiv.addEventListener("mousedown", dragStart);
            document.addEventListener("mouseup", dragEnd);
            document.addEventListener("mousemove", drag);

            function dragStart(e) {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                if (e.target === textDiv) isDragging = true;
            }
            function dragEnd() {
                initialX = currentX;
                initialY = currentY;
                isDragging = false;
            }
            function drag(e) {
                if (isDragging) {
                    e.preventDefault();
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    xOffset = currentX;
                    yOffset = currentY;
                    textDiv.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
                }
            }

            // Double clic pour supprimer le texte
            textDiv.ondblclick = () => textDiv.remove();

            document.getElementById('text-container').appendChild(textDiv);
            document.getElementById('text-input').value = ''; // Reset input
        });

        // 7b. Outil Crop (Cropper.js)
        let cropper = null;
        const btnCrop = document.getElementById('btn-crop');
        const btnCropValidate = document.getElementById('btn-crop-validate');

        btnCrop.addEventListener('click', () => {
            if(!userLayer.src) return alert("Importe d'abord une image !");
            
            // On retire temporairement les effets pour le recadrage
            userLayer.style.mixBlendMode = 'normal';
            userLayer.style.filter = 'none';
            userLayer.style.opacity = 1;

            cropper = new Cropper(userLayer, {
                viewMode: 1,
                background: false,
                modal: true,
                guides: true,
                autoCropArea: 0.8
            });

            btnCrop.style.display = 'none';
            btnCropValidate.style.display = 'block';
        });

        btnCropValidate.addEventListener('click', () => {
            if(cropper) {
                const croppedCanvas = cropper.getCroppedCanvas();
                userLayer.src = croppedCanvas.toDataURL();
                
                cropper.destroy();
                cropper = null;

                // Restauration des effets et styles
                userLayer.style.mixBlendMode = document.getElementById('blend-mode').value;
                userLayer.style.opacity = document.getElementById('opacity-slider').value / 100;
                updateFilters();

                btnCrop.style.display = 'block';
                btnCropValidate.style.display = 'none';
            }
        });

        // 8. EXPORTATION
        document.getElementById('btn-export').addEventListener('click', () => {
            const wrapper = document.getElementById('export-wrapper');
            
            html2canvas(wrapper, {
                scale: 2, 
                useCORS: true, 
                allowTaint: true,
                backgroundColor: null // Garde la transparence si besoin
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'glue-club-creation.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
