<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glue Club - Riso Zine Edition</title>
    
    <!-- Google Fonts : Syne, Inter, Playfair -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Cropper.js pour le recadrage -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <!-- html2canvas pour l'exportation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS Variables - Palette Riso + Swiss */
        :root {
            --riso-red: #e0241b;
            --riso-green: #3ea055;
            --swiss-yellow: #f4c522;
            --white: #ffffff;
            --black: #050505;
            
            --font-display: 'Syne', sans-serif;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        /* VERROUILLAGE GLOBAL DE L'ÉCRAN (Empêche le scroll de la page entière) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* Hauteur stricte dynamique pour mobile */
            font-family: var(--font-sans);
            color: var(--black);
            overflow: hidden; /* Coupe le défilement global */
            
            background-color: var(--white);
            background-image: 
                radial-gradient(var(--riso-red) 15%, transparent 16%), 
                radial-gradient(var(--riso-red) 15%, transparent 16%);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
        }

        /* --- POP-UPS FAÇON ZINE --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .poster-modal {
            background: var(--white);
            border: 4px solid var(--black);
            padding: 30px;
            width: 550px;
            max-width: 100%;
            display: none;
            flex-direction: column;
            position: relative;
            box-shadow: 10px 10px 0 var(--riso-green);
        }

        .poster-modal.active { display: flex; }

        .modal-content {
            position: relative;
            z-index: 1;
            text-align: left;
        }

        .modal-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 5px 0;
            line-height: 1;
        }

        .modal-highlight {
            background-color: var(--riso-red);
            color: var(--white);
            display: inline-block;
            padding: 5px 15px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .modal-italic {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-bold {
            background-color: var(--black);
            color: var(--white);
            border: 2px solid var(--black);
            padding: 10px 20px;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
        }

        /* --- APP LAYOUT (SPLIT SCREEN STRICT) --- */
        #app-container {
            display: flex;
            flex-direction: row; /* Force l'affichage côte à côte */
            height: 100dvh;
            width: 100vw;
            filter: blur(10px);
            transition: filter 0.3s ease;
        }

        #app-container.active {
            filter: blur(0);
        }

        /* ZONE IMAGE : FIXE À GAUCHE */
        #canvas-area {
            flex: 1; /* Prend tout l'espace disponible à gauche */
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden; /* L'image ne déborde pas */
        }

        #export-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px; /* Taille max sur PC */
            aspect-ratio: 3/4;
            background-color: var(--white);
            border: 5px solid var(--black);
            box-shadow: 15px 15px 0 var(--black);
            overflow: hidden;
        }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #bg-layer { z-index: 1; }
        #user-layer { z-index: 2; }

        .text-overlay {
            position: absolute;
            z-index: 3;
            font-size: 3rem;
            color: var(--black);
            cursor: move;
            user-select: none;
            white-space: nowrap;
        }

        /* ZONE MENU : À DROITE AVEC DÉFILEMENT INTÉGRÉ */
        #control-panel {
            width: 420px; /* Largeur sur ordinateur */
            height: 100%;
            background-color: var(--white);
            border-left: 5px solid var(--black);
            padding: 30px;
            overflow-y: auto; /* Barre de défilement uniquement ici ! */
            display: flex;
            flex-direction: column;
            gap: 35px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch; /* Défilement fluide sur smartphone */
            position: relative;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .panel-bg-text {
            position: absolute;
            top: -20px;
            right: 10px;
            font-family: var(--font-sans);
            font-weight: 900;
            font-size: 7rem;
            color: var(--black);
            opacity: 0.04;
            writing-mode: vertical-rl;
            pointer-events: none;
            z-index: 0;
            letter-spacing: -5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1;
        }

        .color-label {
            display: inline-table;
            padding: 6px 12px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            align-self: flex-start;
            border: 2px solid var(--black);
        }
        .bg-yellow { background-color: var(--swiss-yellow); color: var(--black); }
        .bg-red { background-color: var(--riso-red); color: var(--white); }
        .bg-green { background-color: var(--riso-green); color: var(--white); }
        .bg-black { background-color: var(--black); color: var(--white); }

        .serif-subtext {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 0.95rem;
            color: var(--black);
        }

        input[type="file"], select, input[type="text"] {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 0.95rem;
            padding: 10px;
            border: 2px solid var(--black);
            background: var(--white);
            color: var(--black);
            border-radius: 0;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--black);
            outline: none;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--white);
            border: 3px solid var(--black);
            cursor: pointer;
            border-radius: 0;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-sans);
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--black);
            cursor: pointer;
            border-radius: 0;
            border: 2px solid var(--black);
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1rem;
            cursor: pointer;
        }

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
        }
        .bg-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid var(--black);
            filter: grayscale(100%) contrast(150%);
        }
        .bg-thumb.active { 
            filter: grayscale(0%) contrast(100%);
            border-color: var(--riso-red);
        }

        .btn-ui {
            background-color: var(--white);
            color: var(--black);
            border: 2px solid var(--black);
            padding: 10px;
            font-family: var(--font-display);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-export {
            background: var(--riso-red);
            color: var(--white);
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.8rem;
            padding: 15px;
            margin-top: 10px;
            border: 4px solid var(--black);
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 6px 6px 0 var(--black);
        }

        /* --- MEDIA QUERY MOBILE (Garde le menu à droite mais réduit sa taille) --- */
        @media (max-width: 900px) {
            #control-panel {
                width: 50vw; /* Prend la moitié de l'écran sur téléphone */
                min-width: 160px; /* Évite qu'il ne soit trop fin */
                padding: 15px 10px;
                gap: 20px;
                border-left: 3px solid var(--black);
            }
            #canvas-area {
                padding: 5px; /* Laisse un max de place à l'image */
            }
            #export-wrapper {
                border-width: 2px;
                box-shadow: 5px 5px 0 var(--black); /* Ombre plus petite sur mobile */
            }
            /* Réduction globale de la taille des textes du menu sur mobile pour que ça rentre */
            .color-label { font-size: 0.7rem; padding: 4px 6px; }
            .serif-subtext, .slider-row, .checkbox-label { font-size: 0.7rem; }
            input[type="file"], select, input[type="text"], .btn-ui {
                font-size: 0.7rem;
                padding: 6px;
            }
            .bg-grid {
                grid-template-columns: repeat(2, 1fr); /* Passe à 2 colonnes d'images sur mobile */
            }
            .btn-export {
                font-size: 1rem;
                padding: 10px;
                box-shadow: 3px 3px 0 var(--black);
            }
            .panel-bg-text { display: none; } /* Cache le gros texte vertical sur mobile */
        }
    </style>
</head>
<body>

    <svg style="display:none;">
        <defs>
            <filter id="bitmap-filter">
                <feColorMatrix type="matrix" values="
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0 0 0 1 0" />
                <feComponentTransfer>
                    <feFuncR type="discrete" tableValues="0 1"/>
                    <feFuncG type="discrete" tableValues="0 1"/>
                    <feFuncB type="discrete" tableValues="0 1"/>
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <!-- ONBOARDING OVERLAY -->
    <div id="overlay">
        <div id="popup-1" class="poster-modal active">
            <div class="modal-content">
                <h1 class="modal-title">G L U E<br>C L U B</h1>
                <div class="modal-highlight">VOL. 01 — ARCHIVE</div>
                <div class="modal-italic">T'as ramené ta colle ?</div>
                <div class="modal-buttons">
                    <button class="btn-bold" id="btn-oui">OUI</button>
                    <button class="btn-bold" id="btn-zappe" style="background:var(--white); color:var(--black);">J'AI ZAPPÉ</button>
                </div>
            </div>
        </div>

        <div id="popup-2" class="poster-modal">
            <div class="modal-content">
                <div class="modal-highlight" style="background:var(--swiss-yellow); color:var(--black);">SYS. WARNING</div>
                <div class="modal-italic">T'es sûr(e) ?</div>
                <div class="modal-buttons">
                    <button class="btn-bold" id="btn-non1">NON</button>
                    <button class="btn-bold" id="btn-non2">NON</button>
                </div>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER (Flex Row forcé) -->
    <div id="app-container">
        <!-- CANVAS (LEFT) -->
        <div id="canvas-area">
            <div id="export-wrapper">
                <img id="bg-layer" class="layer" src="1.jpg" alt="Fond">
                <img id="user-layer" class="layer" src="" alt="" style="display:none;">
                <div id="text-container"></div>
            </div>
        </div>

        <!-- CONTROL PANEL (RIGHT) -->
        <div id="control-panel">
            <div class="panel-bg-text">ZINE</div>
            
            <div class="control-group">
                <span class="color-label bg-yellow">01. IMPORT</span>
                <div class="serif-subtext">Charge ton image perso</div>
                <input type="file" id="upload-user" accept="image/*">
                <button class="btn-ui" id="btn-remove-bg" style="margin-top:5px;">Auto Cut-out</button>
            </div>

            <div class="control-group">
                <span class="color-label bg-green">02. ARCHIVE</span>
                <div class="serif-subtext">Sélectionne un fond</div>
                <div class="bg-grid" id="bg-library"></div>
            </div>

            <div class="control-group">
                <span class="color-label bg-red">03. BLEND</span>
                <select id="blend-mode">
                    <option value="normal">NORMAL</option>
                    <option value="multiply">PRODUIT (MULTIPLY)</option>
                    <option value="screen">SUPERPOSITION (SCREEN)</option>
                    <option value="overlay">INCRUSTATION (OVERLAY)</option>
                    <option value="darken">OBSCURCIR (DARKEN)</option>
                    <option value="lighten">ÉCLAIRCIR (LIGHTEN)</option>
                    <option value="difference">DIFFÉRENCE (DIFFERENCE)</option>
                    <option value="exclusion">EXCLUSION</option>
                </select>
                <div class="slider-row"><span>Opacité</span></div>
                <input type="range" id="opacity-slider" min="0" max="100" value="100">
            </div>

            <div class="control-group">
                <span class="color-label bg-black">04. COLORS</span>
                <div class="slider-row"><span>Luminosité</span></div>
                <input type="range" id="bri-slider" min="0" max="200" value="100">
                <div class="slider-row"><span>Contraste</span></div>
                <input type="range" id="cont-slider" min="0" max="200" value="100">
                <div class="slider-row"><span>Saturation</span></div>
                <input type="range" id="sat-slider" min="0" max="200" value="100">
                <label class="checkbox-label" style="margin-top:5px;">
                    <input type="checkbox" id="bw-toggle"> Monochrome
                </label>
            </div>

            <div class="control-group">
                <span class="color-label bg-yellow">05. DESTRUCT</span>
                <div class="slider-row"><span>Pixelisation</span></div>
                <input type="range" id="pixel-slider" min="0" max="20" value="0">
                <label class="checkbox-label" style="margin-top:5px;">
                    <input type="checkbox" id="bitmap-toggle"> Trame Riso
                </label>
                <div class="slider-row"><span>Seuil</span></div>
                <input type="range" id="bitmap-intensity" min="100" max="500" value="100">
            </div>

            <div class="control-group">
                <span class="color-label bg-green">06. TYPO</span>
                <input type="text" id="text-input" placeholder="Taper un texte...">
                <select id="font-selector">
                    <option value="var(--font-display)">Syne (Étendu)</option>
                    <option value="var(--font-sans)">Inter (Suisse)</option>
                    <option value="var(--font-serif)">Playfair (Italique)</option>
                </select>
                <div style="display:flex; gap:5px;">
                    <button class="btn-ui" id="btn-add-text" style="flex:1;">Ajouter</button>
                    <button class="btn-ui" id="btn-clear-text" style="flex:1; color:var(--riso-red); border-color:var(--riso-red);">Effacer</button>
                </div>
                <button class="btn-ui" id="btn-crop" style="margin-top:5px;">Recadrer</button>
                <button class="btn-bold" id="btn-crop-validate" style="display:none; background:var(--swiss-yellow); color:var(--black); margin-top:5px;">Valider le crop</button>
            </div>

            <button class="btn-export" id="btn-export">EXPORT</button>
        </div>
    </div>

    <script>
        // --- ONBOARDING ---
        const overlay = document.getElementById('overlay');
        const popup1 = document.getElementById('popup-1');
        const popup2 = document.getElementById('popup-2');
        const appContainer = document.getElementById('app-container');

        function startApp() {
            overlay.style.display = 'none';
            appContainer.classList.add('active');
        }

        document.getElementById('btn-oui').onclick = startApp;
        document.getElementById('btn-zappe').onclick = () => {
            popup1.classList.remove('active');
            popup2.classList.add('active');
        };
        document.getElementById('btn-non1').onclick = startApp;
        document.getElementById('btn-non2').onclick = startApp;

        // --- APP LOGIC ---
        const userLayer = document.getElementById('user-layer');
        const bgLayer = document.getElementById('bg-layer');
        
        document.getElementById('upload-user').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const url = URL.createObjectURL(e.target.files[0]);
                userLayer.src = url;
                userLayer.style.display = 'block';
                updateFilters(); 
            }
        });

        document.getElementById('btn-remove-bg').addEventListener('click', () => {
            if(!userLayer.src) return alert("Importez une image d'abord !");
            document.getElementById('blend-mode').value = 'multiply';
            userLayer.style.mixBlendMode = 'multiply';
        });

        const bgLibrary = document.getElementById('bg-library');
        for (let i = 1; i <= 13; i++) {
            const imgPath = `${i}.jpg`;
            const img = document.createElement('img');
            img.className = 'bg-thumb';
            img.src = imgPath;
            if(i === 1) img.classList.add('active');
            img.onclick = () => {
                bgLayer.src = imgPath;
                document.querySelectorAll('.bg-thumb').forEach(el => el.classList.remove('active'));
                img.classList.add('active');
            };
            bgLibrary.appendChild(img);
        }

        document.getElementById('blend-mode').addEventListener('change', (e) => {
            userLayer.style.mixBlendMode = e.target.value;
        });
        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            userLayer.style.opacity = e.target.value / 100;
        });

        const briSlider = document.getElementById('bri-slider');
        const contSlider = document.getElementById('cont-slider');
        const satSlider = document.getElementById('sat-slider');
        const bwToggle = document.getElementById('bw-toggle');
        const pixelSlider = document.getElementById('pixel-slider');
        const bitmapToggle = document.getElementById('bitmap-toggle');
        const bitmapIntensity = document.getElementById('bitmap-intensity');

        function updateFilters() {
            let filterString = `brightness(${briSlider.value}%) contrast(${contSlider.value}%) saturate(${satSlider.value}%) `;
            if (bwToggle.checked) filterString += "grayscale(100%) ";
            if (pixelSlider.value > 0) filterString += `blur(${pixelSlider.value}px) `;
            if (bitmapToggle.checked) filterString += `url(#bitmap-filter) contrast(${bitmapIntensity.value}%) `;
            userLayer.style.filter = filterString;
        }

        [briSlider, contSlider, satSlider, pixelSlider, bitmapIntensity].forEach(s => s.addEventListener('input', updateFilters));
        [bwToggle, bitmapToggle].forEach(t => t.addEventListener('change', updateFilters));

        const textContainer = document.getElementById('text-container');
        
        document.getElementById('btn-add-text').addEventListener('click', () => {
            const textVal = document.getElementById('text-input').value;
            const fontSelected = document.getElementById('font-selector').value;
            if(!textVal) return;

            const textDiv = document.createElement('div');
            textDiv.className = 'text-overlay';
            textDiv.innerText = textVal;
            textDiv.style.fontFamily = fontSelected;
            
            if(fontSelected === 'var(--font-display)') {
                textDiv.style.fontWeight = '800';
                textDiv.style.textTransform = 'uppercase';
                textDiv.style.letterSpacing = '0.1em';
            } else if(fontSelected === 'var(--font-sans)') {
                textDiv.style.fontWeight = '900';
                textDiv.style.textTransform = 'uppercase';
            } else {
                textDiv.style.fontStyle = 'italic';
            }

            textDiv.style.top = '50%';
            textDiv.style.left = '50%';
            textDiv.style.transform = 'translate(-50%, -50%)';
            
            let isDragging = false;
            let initialX, initialY, xOffset = 0, yOffset = 0;

            const dragStart = (e) => {
                initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
                initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
                if (e.target === textDiv) isDragging = true;
            };
            const dragEnd = () => isDragging = false;
            const drag = (e) => {
                if (isDragging) {
                    e.preventDefault();
                    let currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
                    let currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
                    xOffset = currentX; yOffset = currentY;
                    textDiv.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
                }
            };

            textDiv.addEventListener("mousedown", dragStart);
            document.addEventListener("mouseup", dragEnd);
            document.addEventListener("mousemove", drag);
            textDiv.addEventListener("touchstart", dragStart, {passive: false});
            document.addEventListener("touchend", dragEnd);
            document.addEventListener("touchmove", drag, {passive: false});

            textDiv.ondblclick = () => textDiv.remove();

            textContainer.appendChild(textDiv);
            document.getElementById('text-input').value = ''; 
        });

        document.getElementById('btn-clear-text').addEventListener('click', () => {
            textContainer.innerHTML = '';
        });

        let cropper = null;
        const btnCrop = document.getElementById('btn-crop');
        const btnCropValidate = document.getElementById('btn-crop-validate');

        btnCrop.addEventListener('click', () => {
            if(!userLayer.src) return alert("Importez d'abord une image !");
            userLayer.style.mixBlendMode = 'normal';
            userLayer.style.filter = 'none';
            userLayer.style.opacity = 1;
            cropper = new Cropper(userLayer, { viewMode: 1, background: false, modal: true, guides: true, autoCropArea: 0.8 });
            btnCrop.style.display = 'none';
            btnCropValidate.style.display = 'block';
        });

        btnCropValidate.addEventListener('click', () => {
            if(cropper) {
                userLayer.src = cropper.getCroppedCanvas().toDataURL();
                cropper.destroy();
                cropper = null;
                userLayer.style.mixBlendMode = document.getElementById('blend-mode').value;
                userLayer.style.opacity = document.getElementById('opacity-slider').value / 100;
                updateFilters();
                btnCrop.style.display = 'block';
                btnCropValidate.style.display = 'none';
            }
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            html2canvas(document.getElementById('export-wrapper'), {
                scale: 2, useCORS: true, allowTaint: true, backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'glue-club-zine.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
