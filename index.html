<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glue Club - Laboratoire</title>
    
    <!-- Google Fonts : Polices Punk et Fanzine pour le texte créatif et les lettres découpées -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Permanent+Marker&family=Rubik+Glitch&family=Special+Elite&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <!-- Cropper.js pour le recadrage -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <!-- html2canvas pour l'exportation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Déclaration de votre police personnalisée */
        @font-face {
            font-family: 'LoveFont';
            src: url('love.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* CSS Variables */
        :root {
            --pale-pink: #ffc0cb;
            --white: #ffffff;
            --black: #000000;
            --win7-bg: #ece9d8;
            --font-ui: 'LoveFont', sans-serif;
            --font-punk-1: 'Permanent Marker', cursive;
            --font-punk-2: 'Rubik Glitch', system-ui;
            --font-punk-3: 'Creepster', cursive;
            --font-punk-4: 'Special Elite', monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: var(--font-ui);
            background-color: var(--white); /* Fond principal Blanc pur */
            overflow: hidden;
        }

        /* --- POP-UPS WINDOWS 7 STYLE --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .win7-window {
            background: var(--win7-bg);
            border: 2px solid #fff;
            border-right-color: #888;
            border-bottom-color: #888;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.5);
            width: 450px;
            max-width: 90%;
            color: #000;
            display: none;
            flex-direction: column;
        }

        .win7-window.active {
            display: flex;
        }

        .win7-titlebar {
            background: linear-gradient(to right, #0058e6, #3a93ff);
            color: white;
            padding: 5px 10px;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .win7-close {
            background: #e04343;
            color: white;
            border: 1px solid white;
            width: 20px; height: 20px;
            text-align: center;
            line-height: 18px;
            cursor: pointer;
            font-size: 12px;
        }

        .win7-content {
            padding: 30px 20px;
            text-align: center;
        }

        /* Titre "GLUE CLUB" façon lettres découpées (Ransom Note) */
        .magazine-title {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .m-letter {
            display: inline-block;
            padding: 2px 8px;
            font-size: 3.5rem;
            text-transform: uppercase;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 #000;
        }
        .l1 { background: #000; color: #fff; font-family: 'Bebas Neue'; transform: rotate(-5deg); }
        .l2 { background: #fff; color: #000; font-family: 'Special Elite'; transform: rotate(3deg); }
        .l3 { background: #ff007f; color: #fff; font-family: 'Permanent Marker'; transform: rotate(-2deg); }
        .l4 { background: #fff; color: #000; font-family: 'Rubik Glitch'; transform: rotate(6deg); margin-right: 15px;}
        
        .l5 { background: #000; color: #fff; font-family: 'Special Elite'; transform: rotate(2deg); }
        .l6 { background: #fff; color: #000; font-family: 'Bebas Neue'; transform: rotate(-4deg); }
        .l7 { background: #ffc0cb; color: #000; font-family: 'Permanent Marker'; transform: rotate(5deg); }
        .l8 { background: #000; color: #fff; font-family: 'Creepster'; transform: rotate(-3deg); }

        .win7-text {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-family: var(--font-ui);
        }

        .win7-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .win7-btn {
            background: #e1e1e1;
            border: 2px solid #fff;
            border-right-color: #888;
            border-bottom-color: #888;
            padding: 10px 30px;
            cursor: pointer;
            font-family: var(--font-ui);
            font-size: 1.8rem;
            color: #000;
        }
        .win7-btn:active {
            border: 2px solid #888;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        /* --- APP LAYOUT --- */
        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            filter: blur(10px);
            transition: filter 0.3s ease;
        }

        #app-container.active {
            filter: blur(0);
        }

        /* CANVAS AREA (LEFT) */
        #canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
            background-color: var(--white);
        }

        #export-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3/4;
            background-color: var(--white);
            border: 4px solid var(--black); /* Brutalist border */
            box-shadow: 15px 15px 0px rgba(0,0,0,1); /* Brutalist shadow */
            overflow: hidden;
        }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #bg-layer { z-index: 1; }
        
        #user-layer {
            z-index: 2;
            transition: opacity 0.2s ease, filter 0.2s ease;
        }

        .text-overlay {
            position: absolute;
            z-index: 3;
            font-size: 4rem;
            color: var(--white);
            /* Brutalist heavy outline */
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            cursor: move;
            user-select: none;
            white-space: nowrap;
        }

        /* CONTROL PANEL (RIGHT) - BRUTALIST PINK / RIOT GRRRL */
        #control-panel {
            width: 420px;
            background-color: var(--pale-pink);
            border-left: 6px solid var(--black);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
            color: var(--white);
        }

        /* Textes blancs avec contour noir brut pour la lisibilité sur fond rose pâle */
        .brutalist-label {
            font-size: 1.8rem;
            color: var(--white);
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: transparent;
            padding: 0;
        }

        /* Inputs & Selects Brutalistes */
        input[type="file"], select, input[type="text"] {
            font-family: inherit;
            font-size: 1.5rem;
            padding: 10px;
            border: 3px solid var(--black);
            background: var(--white);
            color: var(--black);
            width: 100%;
            box-sizing: border-box;
            box-shadow: 4px 4px 0 var(--black);
            outline: none;
        }
        select, input[type="text"] {
            font-family: Arial, sans-serif; /* Plus lisible pour les options techniques */
            font-weight: bold;
        }

        /* Sliders Brutalistes */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: var(--black);
            border: 2px solid var(--white);
            outline: none;
            box-shadow: 2px 2px 0 var(--black);
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            background: var(--white);
            border: 3px solid var(--black);
            cursor: pointer;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            color: var(--white);
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* Boutons Punk/Fanzine */
        button {
            font-family: var(--font-ui);
            font-size: 1.6rem;
            background: var(--black);
            color: var(--white);
            border: 3px solid var(--black);
            padding: 10px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 5px 5px 0 var(--white);
            text-transform: uppercase;
        }
        button:hover { 
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 var(--white);
        }
        button:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0 var(--white);
        }
        .btn-secondary {
            background: var(--white);
            color: var(--black);
            box-shadow: 4px 4px 0 var(--black);
            border: 3px solid var(--black);
        }
        .btn-secondary:hover {
            box-shadow: 6px 6px 0 var(--black);
        }

        /* Toggle Checkbox */
        input[type="checkbox"] {
            width: 25px;
            height: 25px;
            accent-color: var(--black);
            cursor: pointer;
            border: 2px solid var(--black);
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--white);
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* Background Library Grid */
        .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            max-height: 180px;
            overflow-y: auto;
            border: 4px solid var(--black);
            padding: 5px;
            background: var(--white);
            box-shadow: 5px 5px 0 var(--black);
        }
        .bg-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .bg-thumb:hover { 
            border-color: var(--black);
        }

        /* BIG EXPORT BUTTON */
        .btn-export {
            background: var(--black);
            color: var(--pale-pink);
            font-size: 2.2rem;
            padding: 15px;
            margin-top: 10px;
            border: 4px solid var(--black);
            box-shadow: 6px 6px 0 var(--white);
        }
        .btn-export:hover {
            background: var(--white);
            color: var(--black);
            box-shadow: 8px 8px 0 var(--black);
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 900px) {
            #app-container {
                flex-direction: column;
            }
            #control-panel {
                width: 100%;
                height: 50vh;
                border-left: none;
                border-top: 6px solid var(--black);
            }
            #canvas-area {
                height: 50vh;
            }
        }
    </style>
</head>
<body>

    <!-- SVG Filters for complex destructive effects -->
    <svg style="display:none;">
        <defs>
            <filter id="bitmap-filter">
                <feColorMatrix type="matrix" values="
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0 0 0 1 0" />
                <feComponentTransfer>
                    <feFuncR type="discrete" tableValues="0 1"/>
                    <feFuncG type="discrete" tableValues="0 1"/>
                    <feFuncB type="discrete" tableValues="0 1"/>
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <!-- ONBOARDING OVERLAY -->
    <div id="overlay">
        <!-- POP-UP 1 : ACCUEIL -->
        <div id="popup-1" class="win7-window active">
            <div class="win7-titlebar">
                <span>Système Glue</span>
                <div class="win7-close">X</div>
            </div>
            <div class="win7-content">
                <!-- Titre en lettres de magazines -->
                <div class="magazine-title">
                    <span class="m-letter l1">G</span>
                    <span class="m-letter l2">L</span>
                    <span class="m-letter l3">U</span>
                    <span class="m-letter l4">E</span>
                    <span class="m-letter l5">C</span>
                    <span class="m-letter l6">L</span>
                    <span class="m-letter l7">U</span>
                    <span class="m-letter l8">B</span>
                </div>
                <div class="win7-text">T'as ramené ta colle ?</div>
                <div class="win7-buttons">
                    <button class="win7-btn" id="btn-oui">Oui</button>
                    <button class="win7-btn" id="btn-zappe">J'ai zappé</button>
                </div>
            </div>
        </div>

        <!-- POP-UP 2 : CONFIRMATION ABSURDE -->
        <div id="popup-2" class="win7-window">
            <div class="win7-titlebar">
                <span>Alerte Système</span>
                <div class="win7-close">X</div>
            </div>
            <div class="win7-content">
                <div class="win7-text">T'es sûr(e) ?</div>
                <div class="win7-buttons">
                    <button class="win7-btn" id="btn-non1">Non</button>
                    <button class="win7-btn" id="btn-non2">Non</button>
                </div>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-container">
        <!-- CANVAS (LEFT) -->
        <div id="canvas-area">
            <div id="export-wrapper">
                <img id="bg-layer" class="layer" src="1.jpg" alt="Fond">
                <img id="user-layer" class="layer" src="" alt="" style="display:none;">
                <div id="text-container"></div>
            </div>
        </div>

        <!-- CONTROL PANEL (RIGHT) -->
        <div id="control-panel">
            
            <!-- 1. Importation & Détourage -->
            <div class="control-group">
                <label class="brutalist-label">1. MON IMAGE</label>
                <input type="file" id="upload-user" accept="image/*">
                <button class="btn-secondary" id="btn-remove-bg">✂️ Détourage Magique</button>
            </div>

            <!-- 2. Bibliothèque -->
            <div class="control-group">
                <label class="brutalist-label">2. FONDS (13)</label>
                <div class="bg-grid" id="bg-library">
                    <!-- Généré par JS -->
                </div>
            </div>

            <!-- 3. Modes de fusion & Intensité -->
            <div class="control-group">
                <label class="brutalist-label">3. MASQUE DE FUSION</label>
                <select id="blend-mode">
                    <option value="normal">Normal</option>
                    <option value="multiply">Produit (Multiply)</option>
                    <option value="screen">Superposition (Screen)</option>
                    <option value="overlay">Incrustation (Overlay)</option>
                    <option value="darken">Obscurcir (Darken)</option>
                    <option value="lighten">Éclaircir (Lighten)</option>
                    <option value="difference">Différence</option>
                    <option value="exclusion">Exclusion</option>
                </select>
                <div class="slider-row">
                    <span>Intensité</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="100" value="100">
            </div>

            <!-- 4. Colorimétrie -->
            <div class="control-group">
                <label class="brutalist-label">4. COULEURS</label>
                <div class="slider-row"><span>Luminosité</span></div>
                <input type="range" id="bri-slider" min="0" max="200" value="100">
                
                <div class="slider-row"><span>Contraste</span></div>
                <input type="range" id="cont-slider" min="0" max="200" value="100">

                <div class="slider-row"><span>Saturation</span></div>
                <input type="range" id="sat-slider" min="0" max="200" value="100">
                
                <label class="checkbox-label" style="margin-top:10px;">
                    <input type="checkbox" id="bw-toggle"> Filtre Noir & Blanc
                </label>
            </div>

            <!-- 5. Effets Destructifs -->
            <div class="control-group">
                <label class="brutalist-label">5. DESTRUCTION</label>
                <div class="slider-row"><span>Pixelisation</span></div>
                <input type="range" id="pixel-slider" min="0" max="20" value="0">
                
                <label class="checkbox-label" style="margin-top:10px;">
                    <input type="checkbox" id="bitmap-toggle"> Effet Bitmap (Seuil PP)
                </label>
                
                <div class="slider-row"><span>Intensité Bitmap</span></div>
                <input type="range" id="bitmap-intensity" min="100" max="500" value="100">
            </div>

            <!-- 6. Outils Créatifs & Textes -->
            <div class="control-group">
                <label class="brutalist-label">6. OUTILS CRÉATIFS</label>
                
                <div style="display:flex; flex-direction:column; gap:5px; margin-bottom:10px;">
                    <input type="text" id="text-input" placeholder="Taper un texte...">
                    <select id="font-selector">
                        <option value="var(--font-punk-1)">Punk : Permanent Marker</option>
                        <option value="var(--font-punk-2)">Punk : Rubik Glitch</option>
                        <option value="var(--font-punk-3)">Punk : Creepster</option>
                        <option value="var(--font-punk-4)">Punk : Special Elite</option>
                        <option value="'LoveFont', sans-serif">Manuscrit : LoveFont</option>
                    </select>
                    <button class="btn-secondary" id="btn-add-text">Ajouter Texte</button>
                    <!-- Nouveau bouton pour supprimer les textes -->
                    <button class="btn-secondary" id="btn-clear-text" style="background:#e04343; color:#fff;">🗑️ Supprimer les textes</button>
                </div>
                
                <button class="btn-secondary" id="btn-crop">Recadrer (Crop)</button>
                <button class="btn-secondary" id="btn-crop-validate" style="display:none; background:#000; color:#fff;">Valider Recadrage</button>
            </div>

            <!-- EXPORT -->
            <button class="btn-export" id="btn-export">Exporter l'image</button>
        </div>
    </div>

    <script>
        // --- ONBOARDING LOGIC ---
        const overlay = document.getElementById('overlay');
        const popup1 = document.getElementById('popup-1');
        const popup2 = document.getElementById('popup-2');
        const appContainer = document.getElementById('app-container');

        function startApp() {
            overlay.style.display = 'none';
            appContainer.classList.add('active');
        }

        document.getElementById('btn-oui').onclick = startApp;
        document.getElementById('btn-zappe').onclick = () => {
            popup1.classList.remove('active');
            popup2.classList.add('active');
        };

        document.getElementById('btn-non1').onclick = startApp;
        document.getElementById('btn-non2').onclick = startApp;
        document.querySelectorAll('.win7-close').forEach(btn => btn.onclick = startApp);

        // --- APP LOGIC ---
        const userLayer = document.getElementById('user-layer');
        const bgLayer = document.getElementById('bg-layer');
        
        // 1. Importation
        document.getElementById('upload-user').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const url = URL.createObjectURL(e.target.files[0]);
                userLayer.src = url;
                userLayer.style.display = 'block';
                updateFilters(); 
            }
        });

        // 2. Détourage auto
        document.getElementById('btn-remove-bg').addEventListener('click', () => {
            if(!userLayer.src) return alert("Importe d'abord une image !");
            document.getElementById('blend-mode').value = 'multiply';
            userLayer.style.mixBlendMode = 'multiply';
        });

        // 3. Bibliothèque (1 à 13)
        const bgLibrary = document.getElementById('bg-library');
        for (let i = 1; i <= 13; i++) {
            const imgPath = `${i}.jpg`;
            const img = document.createElement('img');
            img.className = 'bg-thumb';
            img.src = imgPath;
            img.onclick = () => bgLayer.src = imgPath;
            bgLibrary.appendChild(img);
        }

        // 4. Modes de fusion & Opacité
        document.getElementById('blend-mode').addEventListener('change', (e) => {
            userLayer.style.mixBlendMode = e.target.value;
        });
        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            userLayer.style.opacity = e.target.value / 100;
        });

        // 5 & 6. Filtres 
        const briSlider = document.getElementById('bri-slider');
        const contSlider = document.getElementById('cont-slider');
        const satSlider = document.getElementById('sat-slider');
        const bwToggle = document.getElementById('bw-toggle');
        const pixelSlider = document.getElementById('pixel-slider');
        const bitmapToggle = document.getElementById('bitmap-toggle');
        const bitmapIntensity = document.getElementById('bitmap-intensity');

        function updateFilters() {
            let filterString = `brightness(${briSlider.value}%) contrast(${contSlider.value}%) saturate(${satSlider.value}%) `;
            if (bwToggle.checked) filterString += "grayscale(100%) ";
            if (pixelSlider.value > 0) filterString += `blur(${pixelSlider.value}px) `;
            if (bitmapToggle.checked) filterString += `url(#bitmap-filter) contrast(${bitmapIntensity.value}%) `;
            userLayer.style.filter = filterString;
        }

        [briSlider, contSlider, satSlider, pixelSlider, bitmapIntensity].forEach(s => s.addEventListener('input', updateFilters));
        [bwToggle, bitmapToggle].forEach(t => t.addEventListener('change', updateFilters));

        // 7. Outil Texte
        const textContainer = document.getElementById('text-container');
        
        document.getElementById('btn-add-text').addEventListener('click', () => {
            const textVal = document.getElementById('text-input').value;
            const fontSelected = document.getElementById('font-selector').value;
            if(!textVal) return;

            const textDiv = document.createElement('div');
            textDiv.className = 'text-overlay';
            textDiv.innerText = textVal;
            textDiv.style.fontFamily = fontSelected;
            textDiv.style.top = '50%';
            textDiv.style.left = '50%';
            textDiv.style.transform = 'translate(-50%, -50%)';
            
            // Drag Logic
            let isDragging = false;
            let initialX, initialY, xOffset = 0, yOffset = 0;

            const dragStart = (e) => {
                initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
                initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
                if (e.target === textDiv) isDragging = true;
            };
            const dragEnd = () => isDragging = false;
            const drag = (e) => {
                if (isDragging) {
                    e.preventDefault();
                    let currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
                    let currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
                    xOffset = currentX; yOffset = currentY;
                    textDiv.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
                }
            };

            textDiv.addEventListener("mousedown", dragStart);
            document.addEventListener("mouseup", dragEnd);
            document.addEventListener("mousemove", drag);
            textDiv.addEventListener("touchstart", dragStart, {passive: false});
            document.addEventListener("touchend", dragEnd);
            document.addEventListener("touchmove", drag, {passive: false});

            // Double clic pour supprimer un texte individuel
            textDiv.ondblclick = () => textDiv.remove();

            textContainer.appendChild(textDiv);
            document.getElementById('text-input').value = ''; 
        });

        // Bouton Vider les textes
        document.getElementById('btn-clear-text').addEventListener('click', () => {
            textContainer.innerHTML = '';
        });

        // 7b. Crop 
        let cropper = null;
        const btnCrop = document.getElementById('btn-crop');
        const btnCropValidate = document.getElementById('btn-crop-validate');

        btnCrop.addEventListener('click', () => {
            if(!userLayer.src) return alert("Importe d'abord une image !");
            userLayer.style.mixBlendMode = 'normal';
            userLayer.style.filter = 'none';
            userLayer.style.opacity = 1;
            cropper = new Cropper(userLayer, { viewMode: 1, background: false, modal: true, guides: true, autoCropArea: 0.8 });
            btnCrop.style.display = 'none';
            btnCropValidate.style.display = 'block';
        });

        btnCropValidate.addEventListener('click', () => {
            if(cropper) {
                userLayer.src = cropper.getCroppedCanvas().toDataURL();
                cropper.destroy();
                cropper = null;
                userLayer.style.mixBlendMode = document.getElementById('blend-mode').value;
                userLayer.style.opacity = document.getElementById('opacity-slider').value / 100;
                updateFilters();
                btnCrop.style.display = 'block';
                btnCropValidate.style.display = 'none';
            }
        });

        // 8. EXPORTATION
        document.getElementById('btn-export').addEventListener('click', () => {
            html2canvas(document.getElementById('export-wrapper'), {
                scale: 2, useCORS: true, allowTaint: true, backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'glue-club-creation.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
