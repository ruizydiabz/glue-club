<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glue Club - Collage & Graffiti Edition</title>
    
    <!-- Google Fonts : Syne, Inter, Playfair -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Cropper.js pour le recadrage -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <!-- html2canvas pour l'exportation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --riso-red: #e0241b;
            --riso-green: #3ea055;
            --swiss-yellow: #f4c522;
            --white: #ffffff;
            --black: #050505;
            
            --font-display: 'Syne', sans-serif;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        /* VERROUILLAGE GLOBAL & FOND COLLAGE GRAFFITI */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; 
            font-family: var(--font-sans);
            color: var(--black);
            overflow: hidden; 
            
            background-color: var(--white);
            /* Votre image de collage de tags noir et blanc / gribouillis rouges en fond */
            background-image: url('0012dd4013c5c9a464147e60b9053cf5_3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- POP-UPS COLLAGE STYLE --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .poster-modal {
            background: var(--white);
            border: 5px solid var(--black);
            padding: 40px;
            width: 550px;
            max-width: 100%;
            display: none;
            flex-direction: column;
            position: relative;
            box-shadow: 15px 15px 0 var(--riso-red);
        }

        .poster-modal.active { display: flex; }

        .modal-content {
            position: relative;
            z-index: 1;
            text-align: left;
        }

        .modal-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0 0 10px 0;
            line-height: 0.9;
        }

        .modal-highlight {
            background-color: var(--swiss-yellow);
            color: var(--black);
            display: inline-block;
            padding: 5px 15px;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
            border: 2px solid var(--black);
        }

        .modal-italic {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.4rem;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-bold {
            background-color: var(--black);
            color: var(--white);
            border: 3px solid var(--black);
            padding: 12px 25px;
            font-family: var(--font-display);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
        }
        .btn-bold:hover {
            background-color: var(--swiss-yellow);
            color: var(--black);
            box-shadow: 4px 4px 0 var(--black);
        }

        /* --- APP LAYOUT (SPLIT SCREEN STRICT) --- */
        #app-container {
            display: flex;
            flex-direction: row; 
            height: 100dvh;
            width: 100vw;
            filter: blur(15px);
            transition: filter 0.4s ease;
        }

        #app-container.active { filter: blur(0); }

        /* ZONE IMAGE : FIXE À GAUCHE */
        #canvas-area {
            flex: 1; 
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        #export-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3/4;
            background-color: var(--white);
            border: 6px solid var(--black);
            box-shadow: 20px 20px 0 var(--black);
            overflow: hidden;
        }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #bg-layer { z-index: 1; }
        #user-layer { z-index: 2; }

        .text-overlay {
            position: absolute;
            z-index: 3;
            font-size: 4rem;
            color: var(--black);
            text-shadow: 3px 3px 0 var(--white);
            cursor: move;
            user-select: none;
            white-space: nowrap;
        }

        /* ZONE MENU : À DROITE (STYLE AFFICHE SUISSE & BLOCS) */
        #control-panel {
            width: 450px; 
            height: 100%;
            background-color: var(--white);
            border-left: 6px solid var(--black);
            padding: 35px 25px;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 35px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch; 
            position: relative;
            /* Fond légèrement texturé façon sérigraphie */
            background-image: radial-gradient(rgba(0,0,0,0.05) 15%, transparent 16%);
            background-size: 8px 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1;
            background: var(--white);
            padding: 15px;
            border: 3px solid var(--black);
            box-shadow: 6px 6px 0 var(--black);
        }

        .color-label {
            background-color: var(--swiss-yellow);
            color: var(--black);
            display: inline-table;
            padding: 6px 12px;
            font-family: var(--font-sans);
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            align-self: flex-start;
            border: 2px solid var(--black);
            margin-top: -28px;
            margin-left: -5px;
        }

        .serif-subtext {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 0.9rem;
            color: var(--black);
            margin-bottom: 5px;
        }

        input[type="file"], select, input[type="text"] {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 0.95rem;
            padding: 10px;
            border: 2px solid var(--black);
            background: var(--white);
            color: var(--black);
            border-radius: 0;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        select { cursor: pointer; }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            background: var(--black);
            outline: none;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--swiss-yellow);
            border: 3px solid var(--black);
            cursor: pointer;
            border-radius: 0;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-sans);
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--riso-green);
            cursor: pointer;
            border-radius: 0;
            border: 2px solid var(--black);
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1rem;
            cursor: pointer;
        }

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-height: 140px;
            overflow-y: auto;
        }
        .bg-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid var(--black);
            filter: grayscale(100%) contrast(150%);
            transition: all 0.2s;
        }
        .bg-thumb:hover, .bg-thumb.active { 
            filter: grayscale(0%) contrast(100%);
            border-color: var(--riso-green);
        }

        .btn-ui {
            background-color: var(--white);
            color: var(--black);
            border: 2px solid var(--black);
            padding: 10px;
            font-family: var(--font-sans);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-ui:hover {
            background-color: var(--black);
            color: var(--white);
        }

        .btn-export {
            background: var(--riso-green);
            color: var(--white);
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.8rem;
            padding: 15px;
            margin-top: 5px;
            border: 4px solid var(--black);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 6px 6px 0 var(--black);
            transition: all 0.2s;
        }
        .btn-export:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 var(--black);
            background: var(--riso-red);
        }

        /* --- MEDIA QUERY MOBILE --- */
        @media (max-width: 900px) {
            #control-panel {
                width: 55vw; 
                min-width: 200px; 
                padding: 25px 12px;
                gap: 25px;
                border-left: 4px solid var(--black);
            }
            #canvas-area { padding: 10px; }
            #export-wrapper {
                border-width: 3px;
                box-shadow: 6px 6px 0 var(--black);
            }
            .color-label { font-size: 0.75rem; padding: 4px 8px; margin-top: -22px;}
            .serif-subtext, .slider-row, .checkbox-label { font-size: 0.75rem; }
            input[type="file"], select, input[type="text"], .btn-ui {
                font-size: 0.75rem;
                padding: 6px;
            }
            .bg-grid { grid-template-columns: repeat(2, 1fr); }
            .btn-export {
                font-size: 1.1rem;
                padding: 12px;
                box-shadow: 4px 4px 0 var(--black);
            }
        }
    </style>
</head>
<body>

    <svg style="display:none;">
        <defs>
            <filter id="bitmap-filter">
                <feColorMatrix type="matrix" values="
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0.33 0.33 0.33 0 0
                    0 0 0 1 0" />
                <feComponentTransfer>
                    <feFuncR type="discrete" tableValues="0 1"/>
                    <feFuncG type="discrete" tableValues="0 1"/>
                    <feFuncB type="discrete" tableValues="0 1"/>
                </feComponentTransfer>
            </filter>
        </defs>
    </svg>

    <!-- ONBOARDING OVERLAY -->
    <div id="overlay">
        <div id="popup-1" class="poster-modal active">
            <div class="modal-content">
                <h1 class="modal-title">G L U E<br>C L U B</h1>
                <div class="modal-highlight">VOL. 01 — GRAFFITI MIX</div>
                <div class="modal-italic">T'as ramené ta colle ?</div>
                <div class="modal-buttons">
                    <button class="btn-bold" id="btn-oui">OUI</button>
                    <button class="btn-bold" id="btn-zappe" style="background:var(--white); color:var(--black);">J'AI ZAPPÉ</button>
                </div>
            </div>
        </div>

        <div id="popup-2" class="poster-modal">
            <div class="modal-content">
                <div class="modal-highlight" style="background:var(--riso-red); color:var(--white);">SYS. WARNING</div>
                <div class="modal-italic">T'es sûr(e) ?</div>
                <div class="modal-buttons">
                    <button class="btn-bold" id="btn-non1">NON</button>
                    <button class="btn-bold" id="btn-non2">NON</button>
                </div>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-container">
        <!-- CANVAS (LEFT) -->
        <div id="canvas-area">
            <div id="export-wrapper">
                <img id="bg-layer" class="layer" src="1.jpg" alt="Fond">
                <img id="user-layer" class="layer" src="" alt="" style="display:none;">
                <div id="text-container"></div>
            </div>
        </div>

        <!-- CONTROL PANEL (RIGHT) -->
        <div id="control-panel">
            
            <div class="control-group">
                <span class="color-label">01. IMPORT</span>
                <div class="serif-subtext">Charge ton image perso</div>
                <input type="file" id="upload-user" accept="image/*">
                <button class="btn-ui" id="btn-remove-bg">✂️ Auto Cut-out</button>
            </div>

            <div class="control-group">
                <span class="color-label">02. ARCHIVE</span>
                <div class="serif-subtext">Fonds (1-13)</div>
                <div class="bg-grid" id="bg-library"></div>
            </div>

            <div class="control-group">
                <span class="color-label">03. BLEND</span>
                <select id="blend-mode">
                    <option value="normal">NORMAL</option>
                    <option value="multiply">PRODUIT (MULTIPLY)</option>
                    <option value="screen">SUPERPOSITION (SCREEN)</option>
                    <option value="overlay">INCRUSTATION (OVERLAY)</option>
                    <option value="darken">OBSCURCIR (DARKEN)</option>
                    <option value="lighten">ÉCLAIRCIR (LIGHTEN)</option>
                    <option value="difference">DIFFÉRENCE (DIFFERENCE)</option>
                    <option value="exclusion">EXCLUSION</option>
                </select>
                <div class="slider-row"><span>Opacité</span></div>
                <input type="range" id="opacity-slider" min="0" max="100" value="100">
            </div>

            <div class="control-group">
                <span class="color-label">04. COLORS</span>
                <div class="slider-row"><span>Luminosité</span></div>
                <input type="range" id="bri-slider" min="0" max="200" value="100">
                <div class="slider-row"><span>Contraste</span></div>
                <input type="range" id="cont-slider" min="0" max="200" value="100">
                <div class="slider-row"><span>Saturation</span></div>
                <input type="range" id="sat-slider" min="0" max="200" value="100">
                <label class="checkbox-label" style="margin-top:5px;">
                    <input type="checkbox" id="bw-toggle"> Monochrome
                </label>
            </div>

            <div class="control-group">
                <span class="color-label">05. DESTRUCT</span>
                <div class="slider-row"><span>Pixelisation</span></div>
                <input type="range" id="pixel-slider" min="0" max="20" value="0">
                <label class="checkbox-label" style="margin-top:5px;">
                    <input type="checkbox" id="bitmap-toggle"> Trame Riso
                </label>
                <div class="slider-row"><span>Seuil</span></div>
                <input type="range" id="bitmap-intensity" min="100" max="500" value="100">
            </div>

            <div class="control-group">
                <span class="color-label">06. TYPO</span>
                <input type="text" id="text-input" placeholder="Taper un texte...">
                <select id="font-selector">
                    <option value="var(--font-sans)">Inter (Suisse - Block)</option>
                    <option value="var(--font-display)">Syne (Étendu)</option>
                    <option value="var(--font-serif)">Playfair (Italique)</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <button class="btn-ui" id="btn-add-text" style="flex:1;">Ajouter</button>
                    <button class="btn-ui" id="btn-clear-text" style="flex:1; color:var(--riso-red); border-color:var(--riso-red);">Effacer</button>
                </div>
                <button class="btn-ui" id="btn-crop" style="margin-top:10px;">Recadrer Image</button>
                <button class="btn-bold" id="btn-crop-validate" style="display:none; background:var(--swiss-yellow); color:var(--black); margin-top:10px;">Valider le crop</button>
            </div>

            <button class="btn-export" id="btn-export">EXPORT FILE</button>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const popup1 = document.getElementById('popup-1');
        const popup2 = document.getElementById('popup-2');
        const appContainer = document.getElementById('app-container');

        function startApp() {
            overlay.style.display = 'none';
            appContainer.classList.add('active');
        }

        document.getElementById('btn-oui').onclick = startApp;
        document.getElementById('btn-zappe').onclick = () => {
            popup1.classList.remove('active');
            popup2.classList.add('active');
        };
        document.getElementById('btn-non1').onclick = startApp;
        document.getElementById('btn-non2').onclick = startApp;

        const userLayer = document.getElementById('user-layer');
        const bgLayer = document.getElementById('bg-layer');
        
        document.getElementById('upload-user').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const url = URL.createObjectURL(e.target.files[0]);
                userLayer.src = url;
                userLayer.style.display = 'block';
                updateFilters(); 
            }
        });

        document.getElementById('btn-remove-bg').addEventListener('click', () => {
            if(!userLayer.src) return alert("Importez d'abord une image !");
            document.getElementById('blend-mode').value = 'multiply';
            userLayer.style.mixBlendMode = 'multiply';
        });

        const bgLibrary = document.getElementById('bg-library');
        for (let i = 1; i <= 13; i++) {
            const imgPath = `${i}.jpg`;
            const img = document.createElement('img');
            img.className = 'bg-thumb';
            img.src = imgPath;
            if(i === 1) img.classList.add('active');
            img.onclick = () => {
                bgLayer.src = imgPath;
                document.querySelectorAll('.bg-thumb').forEach(el => el.classList.remove('active'));
                img.classList.add('active');
            };
            bgLibrary.appendChild(img);
        }

        document.getElementById('blend-mode').addEventListener('change', (e) => {
            userLayer.style.mixBlendMode = e.target.value;
        });
        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            userLayer.style.opacity = e.target.value / 100;
        });

        const briSlider = document.getElementById('bri-slider');
        const contSlider = document.getElementById('cont-slider');
        const satSlider = document.getElementById('sat-slider');
        const bwToggle = document.getElementById('bw-toggle');
        const pixelSlider = document.getElementById('pixel-slider');
        const bitmapToggle = document.getElementById('bitmap-toggle');
        const bitmapIntensity = document.getElementById('bitmap-intensity');

        function updateFilters() {
            let filterString = `brightness(${briSlider.value}%) contrast(${contSlider.value}%) saturate(${satSlider.value}%) `;
            if (bwToggle.checked) filterString += "grayscale(100%) ";
            if (pixelSlider.value > 0) filterString += `blur(${pixelSlider.value}px) `;
            if (bitmapToggle.checked) filterString += `url(#bitmap-filter) contrast(${bitmapIntensity.value}%) `;
            userLayer.style.filter = filterString;
        }

        [briSlider, contSlider, satSlider, pixelSlider, bitmapIntensity].forEach(s => s.addEventListener('input', updateFilters));
        [bwToggle, bitmapToggle].forEach(t => t.addEventListener('change', updateFilters));

        const textContainer = document.getElementById('text-container');
        
        document.getElementById('btn-add-text').addEventListener('click', () => {
            const textVal = document.getElementById('text-input').value;
            const fontSelected = document.getElementById('font-selector').value;
            if(!textVal) return;

            const textDiv = document.createElement('div');
            textDiv.className = 'text-overlay';
            textDiv.innerText = textVal;
            textDiv.style.fontFamily = fontSelected;
            
            if(fontSelected === 'var(--font-sans)') {
                textDiv.style.fontWeight = '900';
                textDiv.style.textTransform = 'uppercase';
                textDiv.style.letterSpacing = '-2px';
            } else if(fontSelected === 'var(--font-display)') {
                textDiv.style.fontWeight = '800';
                textDiv.style.textTransform = 'uppercase';
                textDiv.style.letterSpacing = '0.1em';
            } else {
                textDiv.style.fontStyle = 'italic';
            }

            textDiv.style.top = '50%';
            textDiv.style.left = '50%';
            textDiv.style.transform = 'translate(-50%, -50%)';
            
            let isDragging = false;
            let initialX, initialY, xOffset = 0, yOffset = 0;

            const dragStart = (e) => {
                initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
                initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
                if (e.target === textDiv) isDragging = true;
            };
            const dragEnd = () => isDragging = false;
            const drag = (e) => {
                if (isDragging) {
                    e.preventDefault();
                    let currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
                    let currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
                    xOffset = currentX; yOffset = currentY;
                    textDiv.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
                }
            };

            textDiv.addEventListener("mousedown", dragStart);
            document.addEventListener("mouseup", dragEnd);
            document.addEventListener("mousemove", drag);
            textDiv.addEventListener("touchstart", dragStart, {passive: false});
            document.addEventListener("touchend", dragEnd);
            document.addEventListener("touchmove", drag, {passive: false});

            textDiv.ondblclick = () => textDiv.remove();

            textContainer.appendChild(textDiv);
            document.getElementById('text-input').value = ''; 
        });

        document.getElementById('btn-clear-text').addEventListener('click', () => {
            textContainer.innerHTML = '';
        });

        let cropper = null;
        const btnCrop = document.getElementById('btn-crop');
        const btnCropValidate = document.getElementById('btn-crop-validate');

        btnCrop.addEventListener('click', () => {
            if(!userLayer.src) return alert("Importez d'abord une image !");
            userLayer.style.mixBlendMode = 'normal';
            userLayer.style.filter = 'none';
            userLayer.style.opacity = 1;
            cropper = new Cropper(userLayer, { viewMode: 1, background: false, modal: true, guides: true, autoCropArea: 0.8 });
            btnCrop.style.display = 'none';
            btnCropValidate.style.display = 'block';
        });

        btnCropValidate.addEventListener('click', () => {
            if(cropper) {
                userLayer.src = cropper.getCroppedCanvas().toDataURL();
                cropper.destroy();
                cropper = null;
                userLayer.style.mixBlendMode = document.getElementById('blend-mode').value;
                userLayer.style.opacity = document.getElementById('opacity-slider').value / 100;
                updateFilters();
                btnCrop.style.display = 'block';
                btnCropValidate.style.display = 'none';
            }
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            html2canvas(document.getElementById('export-wrapper'), {
                scale: 2, useCORS: true, allowTaint: true, backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'glue-club-zine.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
